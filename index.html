<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Visualizing HVAC Excellence Ticker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    .ticker {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 92px;

      display: flex;
      align-items: center;

      overflow: hidden;
      color: #ffffff;

      background:
        linear-gradient(
          90deg,
          #082f5b 0%,
          #075f9f 55%,
          #1296d4 100%
        );

      border-top: 5px solid #e31b23;
    }

    .brand {
      position: relative;
      z-index: 2;

      height: 100%;
      padding: 0 34px;

      display: flex;
      align-items: center;

      background: #e31b23;

      font-size: 27px;
      font-weight: 800;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .track {
      position: relative;
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    .message {
      position: absolute;
      top: 50%;
      left: 100%;

      transform: translateY(-50%);

      font-size: 29px;
      font-weight: 600;
      white-space: nowrap;

      animation: scroll 28s linear infinite;
    }

    @keyframes scroll {
      from {
        transform: translate(0, -50%);
      }

      to {
        transform: translate(-175%, -50%);
      }
    }
  </style>
</head>

<body>
  <div class="ticker">

    <div class="brand">
      VISUALIZING HVAC EXCELLENCE
    </div>

    <div class="track">
      <div class="message">
        Bringing HVACR education to life
        &nbsp; • &nbsp;
        See it. Learn it. Apply it.
        &nbsp; • &nbsp;
        Interactive HVACR learning from Visual 3D Academy
        &nbsp; • &nbsp;
        Learn more at visual3dacademy.com
        &nbsp; • &nbsp;
      </div>
    </div>

  </div>
</body>
</html>
