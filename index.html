<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Visualizing HVAC Excellence Ticker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    .ticker {
      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 58px;

      display: flex;
      align-items: center;

      overflow: hidden;
      color: white;

      background: rgba(0, 76, 130, 0.58);
      border-bottom: 2px solid rgba(227, 27, 35, 0.75);

      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .logo-box {
      position: relative;
      z-index: 2;

      height: 100%;
      min-width: 170px;
      padding: 5px 16px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255, 255, 255, 0.82);
    }

    .logo-box.left {
      border-right: 2px solid rgba(227, 27, 35, 0.65);
    }

    .logo-box.right {
      border-left: 2px solid rgba(227, 27, 35, 0.65);
    }

    .logo {
      display: block;
      max-width: 145px;
      max-height: 46px;
      object-fit: contain;
    }

    .track {
      position: relative;
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    .message {
      position: absolute;
      top: 50%;
      left: 100%;

      transform: translateY(-50%);

      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;

      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);

      animation: scroll 25s linear infinite;
    }

    @keyframes scroll {
      from {
        transform: translate(0, -50%);
      }

      to {
        transform: translate(-155%, -50%);
      }
    }
  </style>
</head>

<body>
  <div class="ticker">

    <div class="logo-box left">
      <img
        class="logo"
        src="vhe-logo.png"
        alt="Visualizing HVAC Excellence"
      >
    </div>

    <div class="track">
      <div class="message">
        See it. Learn it. Apply it.
        &nbsp; • &nbsp;
        Interactive HVACR learning from Visual 3D Academy
        &nbsp; • &nbsp;
        Learn more at www.visual3dacademy.com
        &nbsp; • &nbsp;
      </div>
    </div>

    <div class="logo-box right">
      <img
        class="logo"
        src="v3d-logo.png"
        alt="Visual 3D Academy"
      >
    </div>

  </div>
</body>
</html>
